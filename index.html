<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Todo管理アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <header class="header">
      <h1 class="header__title">Todo管理</h1>
      <p class="header__count" id="count">0件のタスク</p>
    </header>

    <!-- タブ切り替え -->
    <nav class="tabs">
      <button class="tab tab--active" data-filter="all">すべて</button>
      <button class="tab" data-filter="active">未完了</button>
      <button class="tab" data-filter="done">完了済み</button>
    </nav>

    <!-- Todo一覧 -->
    <main class="main">
      <ul class="todo-list" id="todoList">
        <!-- JSで動的生成 -->
      </ul>
      <p class="empty" id="empty">タスクがありません</p>
    </main>

    <!-- 入力エリア -->
    <footer class="footer">
      <div class="input-area">
        <input
          type="text"
          class="input"
          id="input"
          placeholder="タスクを入力..."
          maxlength="100"
          autocomplete="off"
        >
        <button class="btn btn--add" id="addBtn" aria-label="追加">＋</button>
      </div>
    </footer>
  </div>

  <!-- 編集モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 class="modal__title">タスクを編集</h2>
      <input type="text" class="modal__input" id="modalInput" maxlength="100">
      <div class="modal__actions">
        <button class="btn btn--cancel" id="cancelBtn">キャンセル</button>
        <button class="btn btn--save" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
